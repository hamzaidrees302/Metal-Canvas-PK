<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Canvas-PK | Premium Industrial Art</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        .brand-font { font-family: 'Playfair Display', serif; }
        .product-card:hover { transform: translateY(-10px); transition: 0.4s ease; }
        .admin-hidden { display: none; }
        .thumbnail-active { border: 3px solid #EAB308; transform: scale(1.1); }
    </style>
</head>
<body class="bg-gray-100 text-slate-900">

    <!-- NAVIGATION -->
    <nav class="bg-slate-900 text-white sticky top-0 z-50 shadow-2xl border-b border-yellow-600">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter brand-font text-yellow-500">METAL <span class="text-white">CANVAS-PK</span></h1>
            <div class="hidden md:flex space-x-8 font-medium">
                <a href="#home" class="hover:text-yellow-500 transition">Home</a>
                <a href="#shop" class="hover:text-yellow-500 transition">Shop</a>
                <a href="#admin" onclick="toggleAdmin()" class="hover:text-yellow-500 transition">Admin</a>
            </div>
            <div class="relative cursor-pointer" onclick="toggleCart()">
                <span class="absolute -top-2 -right-2 bg-yellow-500 text-black text-xs rounded-full px-1.5 py-0.5 font-bold" id="cart-count">0</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l1.415 1.414L11 4h7l3 3v7a3 3 0 01-3 3H4a3 3 0 01-3-3V3z" />
                </svg>
            </div>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <section id="home" class="relative h-[70vh] flex items-center justify-center text-center text-white overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1504328397086-75374817a755?q=80&w=2070" class="w-full h-full object-cover opacity-40">
            <div class="absolute inset-0 bg-gradient-to-b from-slate-900/80 to-gray-100"></div>
        </div>
        <div class="relative z-10 px-4">
            <h2 class="text-5xl md:text-7xl font-bold mb-4 brand-font">Precision in Metal,<br><span class="text-yellow-500">Art in Craft</span></h2>
            <p class="text-lg mb-8 text-gray-300 max-w-2xl mx-auto">Custom Gates, BBQ Grills, Railings & Modern Furniture.</p>
            <a href="#shop" class="bg-yellow-500 text-slate-900 px-10 py-4 rounded-full font-bold text-lg hover:bg-yellow-400 transition-all shadow-lg">Explore Collection</a>
        </div>
    </section>

    <!-- SEARCH & FILTERS -->
    <section class="container mx-auto px-4 py-10">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 bg-white p-6 rounded-2xl shadow-sm border">
            <div class="relative w-full md:w-1/3">
                <input type="text" id="search-input" onkeyup="searchProducts()" placeholder="Search products..." class="w-full pl-10 pr-4 py-3 rounded-xl border focus:ring-2 focus:ring-yellow-500 outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute left-3 top-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
            <div class="flex flex-wrap gap-2 justify-center" id="category-filters"></div>
        </div>
    </section>

    <!-- PRODUCT GRID -->
    <section id="shop" class="container mx-auto px-4 py-12">
        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8" id="product-display"></div>
    </section>

    <!-- PRODUCT MODAL -->
    <div id="product-modal" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-5xl rounded-3xl overflow-hidden flex flex-col md:flex-row relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-3xl font-bold text-gray-500 z-10">&times;</button>
            
            <!-- Image Gallery -->
            <div class="w-full md:w-1/2 p-4 flex flex-col gap-4">
                <img id="modal-main-img" src="" class="w-full h-[400px] object-cover rounded-2xl">
                <div id="modal-thumbnails" class="flex gap-2 overflow-x-auto pb-2"></div>
            </div>

            <div class="w-full md:w-1/2 p-8">
                <span id="modal-cat" class="text-yellow-600 font-bold text-sm uppercase tracking-widest">Category</span>
                <h3 id="modal-name" class="text-3xl font-bold mt-2 mb-4">Product Name</h3>
                <p id="modal-price" class="text-2xl font-bold text-slate-800 mb-4">Rs. 0</p>
                <p id="modal-desc" class="text-gray-600 mb-6"></p>
                <div id="modal-stock-info" class="mb-6 p-3 rounded-lg text-sm font-semibold"></div>
                <button id="modal-btn" onclick="addToCartFromModal()" class="w-full py-4 rounded-xl font-bold text-white transition shadow-lg"></button>
            </div>
        </div>
    </div>

    <!-- CART MODAL -->
    <div id="cart-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex justify-end">
        <div class="bg-white w-full max-w-md h-full p-6 flex flex-col">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <h3 class="text-2xl font-bold">Complete Your Order</h3>
                <button onclick="toggleCart()" class="text-3xl">&times;</button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-4"></div>
            
            <div class="border-t pt-6 space-y-4">
                <div class="flex justify-between text-gray-600"><span>Items Total:</span> <span id="items-total">Rs. 0</span></div>
                <div class="flex justify-between text-gray-600"><span>Delivery Charges:</span> <span id="shipping-cost">Rs. 0</span></div>
                <div class="flex justify-between text-2xl font-bold text-slate-900"><span>Grand Total:</span> <span id="cart-total">Rs. 0</span></div>

                <div class="grid grid-cols-1 gap-3 mt-4">
                    <input type="text" id="cust-name" placeholder="Full Name" class="w-full border p-3 rounded-xl outline-none">
                    <input type="text" id="cust-phone" placeholder="Phone Number" class="w-full border p-3 rounded-xl outline-none">
                    <textarea id="cust-address" placeholder="Complete Address" class="w-full border p-3 rounded-xl outline-none"></textarea>
                    
                    <select id="payment-method" onchange="handlePaymentChange()" class="w-full border p-3 rounded-xl outline-none">
                        <option value="Cash on Delivery">Cash on Delivery</option>
                        <option value="EasyPaisa">EasyPaisa</option>
                        <option value="Bank Transfer">Bank Transfer</option>
                    </select>

                    <!-- PAYMENT DETAILS BOX -->
                    <div id="payment-details" class="hidden p-4 bg-yellow-50 border border-yellow-200 rounded-xl text-sm text-yellow-800">
                        <!-- Dynamic Content -->
                    </div>

                    <!-- SCREENSHOT UPLOAD -->
                    <div id="screenshot-upload" class="hidden">
                        <label class="block text-xs font-bold text-gray-500 mb-1">Upload Payment Screenshot:</label>
                        <input type="file" id="pay-proof" accept="image/*" class="w-full text-sm border p-2 rounded-xl">
                    </div>

                    <button onclick="processOrder()" id="order-btn" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700 transition shadow-lg">Confirm Order via WhatsApp</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-panel" class="admin-hidden fixed inset-0 bg-gray-100 z-[100] overflow-y-auto p-6">
        <div class="container mx-auto max-w-5xl bg-white p-8 rounded-3xl shadow-2xl">
            <div class="flex justify-between items-center mb-10 border-b pb-6">
                <h2 class="text-3xl font-bold">Dashboard</h2>
                <button onclick="toggleAdmin()" class="bg-red-500 text-white px-6 py-2 rounded-full font-bold">Logout</button>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="lg:col-span-1 bg-slate-50 p-6 rounded-2xl border">
                    <h4 class="font-bold mb-6 text-xl">Add Product</h4>
                    <div class="space-y-4">
                        <input type="text" id="p-name" placeholder="Product Name" class="w-full border p-3 rounded-xl">
                        <select id="p-cat" class="w-full border p-3 rounded-xl">
                            <option value="BBQ">BBQ</option>
                            <option value="Gates">Gates</option>
                            <option value="Railings">Railings</option>
                            <option value="Furniture">Furniture</option>
                        </select>
                        <input type="number" id="p-price" placeholder="Price (PKR)" class="w-full border p-3 rounded-xl">
                        <input type="number" id="p-shipping" placeholder="Shipping Cost (PKR)" class="w-full border p-3 rounded-xl">
                        <input type="text" id="p-img" placeholder="Image URLs (Separate by comma , )" class="w-full border p-3 rounded-xl">
                        <textarea id="p-desc" placeholder="Detailed Description" class="w-full border p-3 rounded-xl"></textarea>
                        <div class="flex items-center space-x-3"><input type="checkbox" id="p-stock" checked> <label>In Stock?</label></div>
                        <input type="text" id="p-delivery" placeholder="Delivery Time (e.g. 1 Week)" class="w-full border p-3 rounded-xl">
                        <button onclick="saveProduct()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Save Product</button>
                    </div>
                </div>
                <div class="lg:col-span-2" id="admin-product-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-storage.js";

        // 🔴 REPLACE WITH YOUR CONFIG
        const firebaseConfig = {
  apiKey: "AIzaSyA071KVv67tAnSOPZy6uYnPDeg0IuF7zbg",
  authDomain: "metal-canvas-pk.firebaseapp.com",
  databaseURL: "https://metal-canvas-pk-default-rtdb.firebaseio.com",
  projectId: "metal-canvas-pk",
  storageBucket: "metal-canvas-pk.firebasestorage.app",
  messagingSenderId: "377162738163",
  appId: "1:377162738163:web:b91ae74d420b55aae8ca86",
  measurementId: "G-49FCW696TX"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const productsCol = collection(db, "products");

        let allProducts = [];
        let cart = [];
        let selectedProduct = null;

        async function loadProducts() {
            const snapshot = await getDocs(productsCol);
            allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderProducts(allProducts);
            renderAdminProducts(allProducts);
            setupCategoryFilters();
        }

        function setupCategoryFilters() {
            const cats = ["All", ...new Set(allProducts.map(p => p.category))];
            document.getElementById('category-filters').innerHTML = cats.map(cat => 
                `<button onclick="filterCat('${cat}')" class="px-4 py-2 rounded-full bg-white border hover:bg-slate-900 hover:text-white transition">${cat}</button>`
            ).join('');
        }

        function renderProducts(products) {
            document.getElementById('product-display').innerHTML = products.map(p => `
                <div class="product-card bg-white rounded-3xl shadow-sm border p-4 cursor-pointer" onclick="openModal('${p.id}')">
                    <img src="${Array.isArray(p.images) ? p.images[0] : p.img}" class="w-full h-56 object-cover rounded-2xl mb-4">
                    <span class="text-xs font-bold text-yellow-600 uppercase">${p.category}</span>
                    <h4 class="font-bold text-lg mb-1">${p.name}</h4>
                    <p class="text-xl font-bold text-slate-900 mb-4">Rs. ${p.price}</p>
                    <button class="${p.inStock ? 'bg-slate-900' : 'bg-blue-600'} text-white w-full py-2 rounded-lg font-semibold">${p.inStock ? 'View Details' : 'Book Now'}</button>
                </div>
            `).join('');
        }

        window.openModal = (id) => {
            selectedProduct = allProducts.find(p => p.id === id);
            const images = Array.isArray(selectedProduct.images) ? selectedProduct.images : [selectedProduct.img];
            
            document.getElementById('modal-main-img').src = images[0];
            document.getElementById('modal-name').innerText = selectedProduct.name;
            document.getElementById('modal-cat').innerText = selectedProduct.category;
            document.getElementById('modal-price').innerText = `Rs. ${selectedProduct.price}`;
            document.getElementById('modal-desc').innerText = selectedProduct.desc;

            // Render Thumbnails
            const thumbContainer = document.getElementById('modal-thumbnails');
            thumbContainer.innerHTML = images.map((img, idx) => `
                <img src="${img}" onclick="changeMainImg('${img}', this)" class="w-20 h-20 object-cover rounded-lg cursor-pointer border-2 ${idx===0?'thumbnail-active':''}" onerror="this.src='https://via.placeholder.com/100'">
            `).join('');

            const stockInfo = document.getElementById('modal-stock-info');
            const modalBtn = document.getElementById('modal-btn');
            if(selectedProduct.inStock) {
                stockInfo.innerText = "✅ In Stock & Ready";
                stockInfo.className = "mb-6 p-3 rounded-lg text-sm font-semibold bg-green-100 text-green-700";
                modalBtn.innerText = "Add to Cart";
                modalBtn.className = "w-full py-4 rounded-xl font-bold text-white bg-slate-900";
            } else {
                stockInfo.innerText = `⏳ Out of Stock. Delivery: ${selectedProduct.deliveryTime}`;
                stockInfo.className = "mb-6 p-3 rounded-lg text-sm font-semibold bg-blue-100 text-blue-700";
                modalBtn.innerText = "Pre-Book Now";
                modalBtn.className = "w-full py-4 rounded-xl font-bold text-white bg-blue-600";
            }
            document.getElementById('product-modal').classList.remove('hidden');
        };

        window.changeMainImg = (src, el) => {
            document.getElementById('modal-main-img').src = src;
            document.querySelectorAll('#modal-thumbnails img').forEach(img => img.classList.remove('thumbnail-active'));
            el.classList.add('thumbnail-active');
        };

        window.closeModal = () => document.getElementById('product-modal').classList.add('hidden');

        window.addToCartFromModal = () => {
            cart.push(selectedProduct);
            updateCartUI();
            closeModal();
        };

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-items');
            list.innerHTML = cart.map((item, index) => `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border">
                    <div class="flex items-center gap-3">
                        <img src="${Array.isArray(item.images) ? item.images[0] : item.img}" class="w-12 h-12 object-cover rounded-lg">
                        <div><p class="font-bold text-sm">${item.name}</p><p class="text-xs text-gray-500">Rs. ${item.price}</p></div>
                    </div>
                    <button onclick="removeFromCart(${index})" class="text-red-500 font-bold">&times;</button>
                </div>
            `).join('');

            let itemsTotal = cart.reduce((sum, item) => sum + parseInt(item.price), 0);
            
            // Dynamic Shipping: Sum of all product shipping costs
            let totalShipping = cart.reduce((sum, item) => sum + (parseInt(item.shippingCost) || 0), 0);

            document.getElementById('items-total').innerText = `Rs. ${itemsTotal}`;
            document.getElementById('shipping-cost').innerText = `Rs. ${totalShipping}`;
            document.getElementById('cart-total').innerText = `Rs. ${itemsTotal + totalShipping}`;
        }

        window.removeFromCart = (index) => {
            cart.splice(index, 1);
            updateCartUI();
        };

        window.handlePaymentChange = () => {
            const method = document.getElementById('payment-method').value;
            const details = document.getElementById('payment-details');
            const upload = document.getElementById('screenshot-upload');
            
            if(method === "EasyPaisa") {
                details.innerHTML = `<strong>EasyPaisa Account:</strong><br>Number: 03310423620<br>Name: Hamza Idrees`;
                details.classList.remove('hidden');
                upload.classList.remove('hidden');
            } else if(method === "Bank Transfer") {
                details.innerHTML = `<strong>Bank Account Details:</strong><br>Bank: Dubai Islamic Bank<br>Account No: 0939972001<br>Name: Hamza Idrees`;
                details.classList.remove('hidden');
                upload.classList.remove('hidden');
            } else {
                details.classList.add('hidden');
                upload.classList.add('hidden');
            }
        };

        window.processOrder = async () => {
            const btn = document.getElementById('order-btn');
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const addr = document.getElementById('cust-address').value;
            const pay = document.getElementById('payment-method').value;
            const total = document.getElementById('cart-total').innerText;
            const shipping = document.getElementById('shipping-cost').innerText;

            if(!name || !phone || !addr) return alert("Please fill all details");

            btn.innerText = "Processing...";
            btn.disabled = true;

            let proofUrl = "No screenshot provided";
            const file = document.getElementById('pay-proof').files[0];
            if(file) {
                try {
                    const storageRef = ref(storage, `payments/${Date.now()}_${file.name}`);
                    await uploadBytes(storageRef, file);
                    proofUrl = await getDownloadURL(storageRef);
                } catch (e) {
                    alert("Proof upload failed!");
                    btn.innerText = "Confirm Order via WhatsApp";
                    btn.disabled = false;
                    return;
                }
            }

            const invoiceNo = "MC-" + Math.floor(Math.random() * 1000000);
            let itemsText = cart.map(p => `- ${p.name} (Rs. ${p.price})`).join('\n');

            const whatsappMsg = `📦 *NEW ORDER: ${invoiceNo}*%0A----------------------------%0A👤 *Customer:* ${name}%0A📞 *Phone:* ${phone}%0A📍 *Address:* ${addr}%0A----------------------------%0A🛍 *Items:*%0A${itemsText}%0A----------------------------%0A🚚 *Shipping:* ${shipping}%0A💰 *Grand Total:* ${total}%0A💳 *Payment:* ${pay}%0A🖼 *Proof:* ${proofUrl}%0A----------------------------`;
            
            generateProfessionalPDF(name, phone, addr, cart, total, shipping, invoiceNo);
            window.open(`https://wa.me/923310423620?text=${whatsappMsg}`, '_blank');
            btn.innerText = "Order Placed!";
            btn.disabled = false;
        };

        async function generateProfessionalPDF(name, phone, addr, items, total, shipping, inv) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(15, 23, 42);
            doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 215, 0);
            doc.setFontSize(24);
            doc.text("METAL CANVAS-PK", 105, 20, { align: "center" });
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(12);
            doc.text(`Invoice: ${inv}`, 14, 50);
            doc.text(`Customer: ${name}`, 14, 56);
            doc.text(`Address: ${addr}`, 14, 62);
            const tableData = items.map((i, index) => [index + 1, i.name, i.category, i.price]);
            doc.autoTable({
                startY: 70,
                head: [['#', 'Product', 'Category', 'Price']],
                body: tableData,
                headStyles: { fillColor: [15, 23, 42] },
            });
            const finalY = doc.lastAutoTable.finalY + 10;
            doc.text(`Shipping Charges: ${shipping}`, 150, finalY);
            doc.setFont(undefined, 'bold');
            doc.text(`Grand Total: ${total}`, 150, finalY + 7);
            doc.save(`Invoice_${inv}.pdf`);
        }

        window.saveProduct = async () => {
            const imgInput = document.getElementById('p-img').value;
            const newP = {
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat').value,
                price: document.getElementById('p-price').value,
                shippingCost: document.getElementById('p-shipping').value,
                images: imgInput.split(',').map(s => s.trim()),
                img: imgInput.split(',')[0].trim(),
                desc: document.getElementById('p-desc').value,
                inStock: document.getElementById('p-stock').checked,
                deliveryTime: document.getElementById('p-delivery').value
            };
            await addDoc(productsCol, newP);
            alert("Product Added!");
            loadProducts();
        };

        function renderAdminProducts(products) {
            document.getElementById('admin-product-list').innerHTML = products.map(p => `
                <div class="flex justify-between items-center p-4 bg-white border rounded-xl">
                    <div class="flex items-center gap-3">
                        <img src="${Array.isArray(p.images) ? p.images[0] : p.img}" class="w-10 h-10 object-cover rounded">
                        <span class="font-medium">${p.name}</span>
                    </div>
                    <button onclick="deleteProduct('${p.id}')" class="text-red-500">Delete</button>
                </div>
            `).join('');
        }

        window.deleteProduct = async (id) => {
            if(confirm("Delete?")) {
                await deleteDoc(doc(db, "products", id));
                loadProducts();
            }
        };

        window.toggleCart = () => document.getElementById('cart-modal').classList.toggle('hidden');
        window.toggleAdmin = () => {
            const pass = prompt("Password:");
            if(pass === "admin123") document.getElementById('admin-panel').classList.toggle('admin-hidden');
        };

        window.searchProducts = () => {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(q)));
        };

        window.filterCat = (cat) => {
            if(cat === 'All') renderProducts(allProducts);
            else renderProducts(allProducts.filter(p => p.category === cat));
        };

        loadProducts();
    </script>
</body>
</html>
