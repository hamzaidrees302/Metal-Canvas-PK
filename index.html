<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Canvas-PK | Premium Metal Works</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- jsPDF for Invoice -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        .product-card:hover { transform: translateY(-5px); transition: 0.3s; }
        .admin-hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- NAVIGATION -->
    <nav class="bg-slate-900 text-white sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-widest text-yellow-500">METAL CANVAS-PK</h1>
            <div class="hidden md:flex space-x-6">
                <a href="#home" class="hover:text-yellow-500">Home</a>
                <a href="#shop" class="hover:text-yellow-500">Shop</a>
                <a href="#admin" onclick="toggleAdmin()" class="hover:text-yellow-500">Admin</a>
            </div>
            <div class="relative cursor-pointer" onclick="toggleCart()">
                <span class="absolute -top-2 -right-2 bg-yellow-500 text-black text-xs rounded-full px-1.5 py-0.5 font-bold" id="cart-count">0</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l1.415 1.414L11 4h7l3 3v7a3 3 0 01-3 3H4a3 3 0 01-3-3V3z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11l-1 3h-2l-1-3" />
                </svg>
            </div>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <section id="home" class="relative h-[70vh] flex items-center justify-center bg-slate-800 text-white text-center overflow-hidden">
        <div class="absolute inset-0 opacity-40 bg-[url('https://images.unsplash.com/photo-1504328397086-75374817a755?q=80&w=2070')] bg-cover bg-center"></div>
        <div class="relative z-10 px-4">
            <h2 class="text-4xl md:text-6xl font-bold mb-4">Premium Metal Craftsmanship</h2>
            <p class="text-lg mb-8 text-gray-300">Custom Gates, BBQ Grills, Railings & Modern Furniture</p>
            <a href="#shop" class="bg-yellow-500 text-black px-8 py-3 rounded-full font-bold hover:bg-yellow-400 transition">Shop Now</a>
        </div>
    </section>

    <!-- CATEGORIES -->
    <section class="container mx-auto px-4 py-12">
        <h3 class="text-2xl font-bold text-center mb-8">Product Categories</h3>
        <div class="grid grid-cols-2 md:grid-cols-6 gap-4" id="category-list">
            <!-- Categories will be injected here via JS -->
        </div>
    </section>

    <!-- PRODUCT GRID -->
    <section id="shop" class="container mx-auto px-4 py-12">
        <div class="flex justify-between items-center mb-8">
            <h3 class="text-3xl font-bold">Our Products</h3>
            <select id="filter-cat" onchange="filterProducts()" class="border p-2 rounded-lg outline-none">
                <option value="All">All Categories</option>
                <option value="BBQ">BBQ</option>
                <option value="Gates">Gates</option>
                <option value="Railings">Railings</option>
                <option value="Furniture">Furniture</option>
            </select>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6" id="product-display">
            <!-- Products from Firebase -->
        </div>
    </section>

    <!-- CART MODAL -->
    <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex justify-end">
        <div class="bg-white w-full max-w-md h-full p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">Your Cart</h3>
                <button onclick="toggleCart()" class="text-red-500 font-bold text-xl">&times;</button>
            </div>
            <div id="cart-items" class="space-y-4">
                <!-- Cart Items -->
            </div>
            <div class="border-t mt-6 pt-4">
                <div class="flex justify-between text-xl font-bold mb-6">
                    <span>Total:</span>
                    <span id="cart-total">Rs. 0</span>
                </div>
                <!-- Checkout Form -->
                <div class="space-y-4">
                    <input type="text" id="cust-name" placeholder="Full Name" class="w-full border p-2 rounded">
                    <input type="text" id="cust-phone" placeholder="Phone Number" class="w-full border p-2 rounded">
                    <textarea id="cust-address" placeholder="Full Delivery Address" class="w-full border p-2 rounded"></textarea>
                    <select id="payment-method" class="w-full border p-2 rounded">
                        <option value="COD">Cash on Delivery</option>
                        <option value="EasyPaisa">EasyPaisa</option>
                        <option value="JazzCash">JazzCash</option>
                    </select>
                    <button onclick="processOrder()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition">Confirm Order via WhatsApp</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ADMIN PANEL (HIDDEN BY DEFAULT) -->
    <div id="admin-panel" class="admin-hidden fixed inset-0 bg-gray-100 z-50 overflow-y-auto p-6">
        <div class="container mx-auto max-w-4xl bg-white p-8 rounded-xl shadow-2xl">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <h2 class="text-3xl font-bold text-slate-800">Admin Dashboard</h2>
                <button onclick="toggleAdmin()" class="bg-red-500 text-white px-4 py-2 rounded">Logout</button>
            </div>
            
            <!-- Add Product Form -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
                <div class="bg-gray-50 p-6 rounded-lg border">
                    <h4 class="font-bold mb-4 text-lg">Add New Product</h4>
                    <div class="space-y-3">
                        <input type="text" id="p-name" placeholder="Product Name" class="w-full border p-2 rounded">
                        <select id="p-cat" class="w-full border p-2 rounded">
                            <option value="BBQ">BBQ</option>
                            <option value="Gates">Gates</option>
                            <option value="Railings">Railings</option>
                            <option value="Furniture">Furniture</option>
                            <option value="Shelves">Shelves</option>
                            <option value="Custom Work">Custom Work</option>
                        </select>
                        <input type="number" id="p-price" placeholder="Price (PKR)" class="w-full border p-2 rounded">
                        <input type="text" id="p-img" placeholder="Image URL" class="w-full border p-2 rounded">
                        <input type="text" id="p-video" placeholder="Video URL (Optional)" class="w-full border p-2 rounded">
                        <textarea id="p-desc" placeholder="Product Description" class="w-full border p-2 rounded"></textarea>
                        <div class="flex items-center space-x-2">
                            <label>In Stock?</label>
                            <input type="checkbox" id="p-stock" checked>
                        </div>
                        <input type="text" id="p-delivery" placeholder="Estimated Delivery (e.g. 1 Week)" class="w-full border p-2 rounded">
                        <button onclick="saveProduct()" class="w-full bg-slate-800 text-white py-2 rounded font-bold">Save Product</button>
                    </div>
                </div>
                <div class="bg-gray-50 p-6 rounded-lg border overflow-y-auto max-h-[500px]">
                    <h4 class="font-bold mb-4 text-lg">Manage Inventory</h4>
                    <div id="admin-product-list" class="space-y-2">
                        <!-- Admin product list here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script type="module">
        // Import Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        // 🔴 REPLACE THIS WITH YOUR OWN FIREBASE CONFIG
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyA071KVv67tAnSOPZy6uYnPDeg0IuF7zbg",
  authDomain: "metal-canvas-pk.firebaseapp.com",
  projectId: "metal-canvas-pk",
  storageBucket: "metal-canvas-pk.firebasestorage.app",
  messagingSenderId: "377162738163",
  appId: "1:377162738163:web:b91ae74d420b55aae8ca86",
  measurementId: "G-49FCW696TX"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const productsCol = collection(db, "products");

        // Global State
        let allProducts = [];
        let cart = [];

        // Initialize Page
        async function loadProducts() {
            const snapshot = await getDocs(productsCol);
            allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderProducts(allProducts);
            renderAdminProducts(allProducts);
        }

        function renderProducts(products) {
            const container = document.getElementById('product-display');
            container.innerHTML = '';
            products.forEach(p => {
                const btnText = p.inStock ? 'Add to Cart' : 'Book Now';
                const btnColor = p.inStock ? 'bg-yellow-500' : 'bg-blue-600';
                
                container.innerHTML += `
                    <div class="product-card bg-white p-4 rounded-xl shadow-md border">
                        <img src="${p.img}" class="w-full h-48 object-cover rounded-lg mb-4">
                        <h4 class="font-bold text-lg">${p.name}</h4>
                        <p class="text-gray-500 text-sm mb-2">${p.category}</p>
                        <p class="text-xl font-bold text-slate-800 mb-4">Rs. ${p.price}</p>
                        ${!p.inStock ? `<p class="text-xs text-red-500 mb-2">Estimated Delivery: ${p.deliveryTime}</p>` : ''}
                        <button onclick="addToCart('${p.id}')" class="${btnColor} text-white w-full py-2 rounded-lg font-semibold">${btnText}</button>
                    </div>
                `;
            });
        }

        // Admin functions (Attached to window for HTML access)
        window.saveProduct = async () => {
            const newP = {
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat').value,
                price: document.getElementById('p-price').value,
                img: document.getElementById('p-img').value,
                video: document.getElementById('p-video').value,
                desc: document.getElementById('p-desc').value,
                inStock: document.getElementById('p-stock').checked,
                deliveryTime: document.getElementById('p-delivery').value
            };
            await addDoc(productsCol, newP);
            alert("Product Added!");
            loadProducts();
        };

        window.addToCart = (id) => {
            const prod = allProducts.find(p => p.id === id);
            cart.push(prod);
            updateCartUI();
        };

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-items');
            list.innerHTML = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += parseInt(item.price);
                list.innerHTML += `
                    <div class="flex justify-between items-center border-b pb-2">
                        <div>
                            <p class="font-bold">${item.name}</p>
                            <p class="text-sm">Rs. ${item.price}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-red-500">Remove</button>
                    </div>
                `;
            });
            document.getElementById('cart-total').innerText = `Rs. ${total}`;
        }

        window.removeFromCart = (index) => {
            cart.splice(index, 1);
            updateCartUI();
        };

        window.processOrder = async () => {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const addr = document.getElementById('cust-address').value;
            const pay = document.getElementById('payment-method').value;
            const total = document.getElementById('cart-total').innerText;

            if(!name || !phone || !addr) return alert("Please fill all details");

            const invoiceNo = "MC-" + Math.floor(Math.random() * 100000);
            let productListText = "";
            cart.forEach(p => productListText += `- ${p.name} (Rs. ${p.price})\n`);

            const whatsappMsg = `📦 *New Order: ${invoiceNo}*%0A--------------------------%0A👤 *Name:* ${name}%0A📞 *Phone:* ${phone}%0A📍 *Address:* ${addr}%0A--------------------------%0A🛍 *Items:*%0A${productListText}%0A--------------------------%0A💰 *Total:* ${total}%0A💳 *Payment:* ${pay}%0A--------------------------`;
            
            // Generate PDF Invoice
            generatePDF(name, phone, addr, cart, total, invoiceNo);

            // Redirect to WhatsApp
            window.open(`https://wa.me/923310423620?text=${whatsappMsg}`, '_blank');
        };

        async function generatePDF(name, phone, addr, items, total, inv) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(20);
            doc.text("METAL CANVAS-PK", 105, 20, { align: "center" });
            doc.setFontSize(12);
            doc.text(`Invoice No: ${inv}`, 14, 30);
            doc.text(`Date: ${new Date().toLocaleDateString()}`, 14, 36);
            doc.text(`Customer: ${name}`, 14, 42);
            doc.text(`Phone: ${phone}`, 14, 48);
            doc.text(`Address: ${addr}`, 14, 54);

            const tableData = items.map(i => [i.name, i.category, i.price]);
            doc.autoTable({
                startY: 65,
                head: [['Product', 'Category', 'Price']],
                body: tableData,
            });

            doc.text(`Grand Total: ${total}`, 14, doc.lastAutoTable.finalY + 10);
            doc.save(`Invoice_${inv}.pdf`);
        }

        window.toggleCart = () => document.getElementById('cart-modal').classList.toggle('hidden');
        window.toggleAdmin = () => {
            const pass = prompt("Enter Admin Password:");
            if(pass === "admin123") { // Change this password
                document.getElementById('admin-panel').classList.toggle('admin-hidden');
            } else {
                alert("Wrong Password!");
            }
        };

        loadProducts();
    </script>
</body>
</html>
